<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DWG 视频浏览器</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;max-width:1000px;margin:24px auto;padding:0 16px;color:#111}
    h1{margin-bottom:8px}
    ul{list-style:none;padding-left:0}
    li{margin:6px 0;padding:8px;border:1px solid #eee;border-radius:6px;display:flex;align-items:center;gap:12px}
    .folder{font-weight:600}
    button{padding:6px 10px;border-radius:6px;border:1px solid #ccc;background:#f7f7f7;cursor:pointer}
    .player{margin-top:18px}
    .path{color:#555;font-size:13px}
  </style>
</head>
<body>
  <h1>DWG - 仓库视频浏览器</h1>
  <p id="info">正在读取仓库...</p>
  <div>
    查找路径：
    <input id="pathInput" placeholder="留空表示仓库根目录（例如 videos ）" style="width:240px;padding:6px;margin-left:8px"/>
    <button id="reloadBtn">读取并显示</button>
  </div>

  <ul id="list"></ul>

  <div class="player" id="playerArea" style="display:none">
    <h3 id="nowPlaying">正在播放：</h3>
    <video id="videoPlayer" controls style="width:100%;max-height:70vh;background:#000"></video>
    <p class="path" id="filePath"></p>
  </div>

  <script>
    const owner = 'husky1919';
    const repo = 'DWG';
    const ref = 'main'; // 如需改分支可改这里
    // 如果仓库是私有或你想提高速率限制，设置 token（注意不要在公共页面公开 token）
    const GITHUB_TOKEN = null; // e.g. 'ghp_xxx' —— 若公开放在 Pages 切勿填写

    const videoExts = ['.mp4','.webm','.ogg','.mov','.m4v','.mpg','.mpeg','.ogv'];

    const listEl = document.getElementById('list');
    const infoEl = document.getElementById('info');
    const playerArea = document.getElementById('playerArea');
    const videoPlayer = document.getElementById('videoPlayer');
    const nowPlaying = document.getElementById('nowPlaying');
    const filePathEl = document.getElementById('filePath');
    const pathInput = document.getElementById('pathInput');
    const reloadBtn = document.getElementById('reloadBtn');

    reloadBtn.addEventListener('click', ()=> {
      loadAndRender(pathInput.value.trim());
    });

    async function apiFetch(path) {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(ref)}`;
      const headers = { Accept: 'application/vnd.github.v3+json' };
      if (GITHUB_TOKEN) headers.Authorization = 'token ' + GITHUB_TOKEN;
      const res = await fetch(url, { headers });
      if (!res.ok) throw new Error('GitHub API 错误: ' + res.status + ' ' + res.statusText);
      return res.json();
    }

    function isVideo(name) {
      const lower = name.toLowerCase();
      return videoExts.some(ext => lower.endsWith(ext));
    }

    async function listContentsRec(path, parentUl) {
      let items;
      try {
        items = await apiFetch(path === '' ? '' : path);
      } catch (e) {
        const li = document.createElement('li');
        li.textContent = '读取失败: ' + e.message;
        parentUl.appendChild(li);
        return;
      }
      // items can be a file object or array for directory
      if (!Array.isArray(items)) {
        // single file
        if (items.type === 'file' && isVideo(items.name)) {
          appendFileItem(items, parentUl, path || '');
        }
        return;
      }

      // sort: folders first
      items.sort((a,b)=> (a.type===b.type? a.name.localeCompare(b.name) : a.type==='dir'? -1:1));

      for (const item of items) {
        if (item.type === 'dir') {
          const li = document.createElement('li');
          li.className = 'folder';
          const btn = document.createElement('button');
          btn.textContent = '展开';
          btn.addEventListener('click', async () => {
            if (btn.dataset.expanded === '1') {
              // collapse
              btn.dataset.expanded = '0';
              btn.textContent = '展开';
              if (li.querySelector('ul')) li.removeChild(li.querySelector('ul'));
            } else {
              btn.dataset.expanded = '1';
              btn.textContent = '收起';
              const childUl = document.createElement('ul');
              childUl.style.marginTop = '8px';
              childUl.style.marginLeft = '12px';
              li.appendChild(childUl);
              await listContentsRec(item.path, childUl);
            }
          });
          li.appendChild(btn);
          const span = document.createElement('span');
          span.textContent = ' / ' + item.name;
          li.appendChild(span);
          parentUl.appendChild(li);
        } else if (item.type === 'file') {
          if (isVideo(item.name)) appendFileItem(item, parentUl);
        }
      }
    }

    function appendFileItem(item, parentUl) {
      const li = document.createElement('li');
      const nameSpan = document.createElement('span');
      nameSpan.textContent = item.name;
      nameSpan.style.flex = '1';
      li.appendChild(nameSpan);

      const playBtn = document.createElement('button');
      playBtn.textContent = '播放';
      playBtn.addEventListener('click', ()=> {
        playFile(item);
      });
      li.appendChild(playBtn);

      const openBtn = document.createElement('button');
      openBtn.textContent = '在新标签打开';
      openBtn.addEventListener('click', ()=> {
        // download_url points to raw.githubusercontent.com
        const url = item.download_url || `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${item.path}`;
        window.open(url, '_blank');
      });
      li.appendChild(openBtn);

      const small = document.createElement('div');
      small.className = 'path';
      small.textContent = item.path;
      small.style.marginTop = '6px';
      small.style.gridColumn = '1/-1';
      li.appendChild(small);

      parentUl.appendChild(li);
    }

    function playFile(item) {
      const url = item.download_url || `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${item.path}`;
      videoPlayer.src = url;
      nowPlaying.textContent = '正在播放：' + item.name;
      filePathEl.textContent = item.path;
      playerArea.style.display = 'block';
      videoPlayer.play().catch(()=>{});
      // 滚动到播放器
      playerArea.scrollIntoView({behavior:'smooth'});
    }

    async function loadAndRender(startPath='') {
      listEl.innerHTML = '';
      infoEl.textContent = '读取仓库...';
      playerArea.style.display = 'none';
      try {
        await listContentsRec(startPath, listEl);
        infoEl.textContent = '完成。点击播放或在新标签打开原始文件。';
      } catch (e) {
        infoEl.textContent = '发生错误：' + e.message;
      }
    }

    // 首次加载根目录
    loadAndRender('');

  </script>
</body>
</html>
